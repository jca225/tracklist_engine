paths:
  artist_set_jsons_dir: "./data/djs"
  db_path: "./data/db/music_database.db"
  schema_path: "./web_crawler/database/schema.sql"
  log_dir: "./logs"
  captcha_imgs_dir: "./data/captcha_imgs"

# Artist selection configurations - for the generator object
generator:
  testing: false
  filters:
    dj_files: []
    title_contains: []
    set_ids: []
  limit: 0
  order: random
  seed: 300
  fill: false
  log_sets: false
  log_set_dir: "./set_testing"

execution:
  restart_every_n_sets: 75
  log_every_n_sets: 25

profiles:
  base_dir: "./profiles"
  num_profiles: 1
  retire_after_n_sites: 750

timing:
  crawl_delay_s: 10
  random_jitter_s: 2

browser:
  # Production default: headless on the Pi cluster (no display).
  # Override locally on Mac/dev when you want a visible browser.
  headless: true
  locale: "en-US"
  timezone: "America/New_York"
  viewport:
    width: 1366
    height: 768
  user_agent: "Chrome/120.0.0.0 Safari/537.36"
  args: ["--disable-session-crashed-bubble", "--hide-crash-restore-bubble", "--disable-blink-features=AutomationControlled"]
  nav_timeout_ms: 60000
  selector_timeout_ms: 10000

failure:
  fail_fast: false
  fail_dir: "./failures"
  ajax_failure: continue
  ajax_wait_s: 1800
  kill_process_after_consecutive_failures: 5

retry:
  max_retries: 4
  retry_delay_s: 10
  retry_jitter_s: 2

captcha:
  mode: continue
  captcha_wait_s: 300
  solver_max_attempts: 100
