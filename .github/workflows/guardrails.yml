name: guardrails

on:
  push:
    branches: [main]
  pull_request:

jobs:
  guardrails:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install system dependencies
        run: sudo apt-get update -qq && sudo apt-get install -y -qq ffmpeg

      - name: Install test dependencies
        run: pip install -q -r requirements-ci.txt

      - name: Mechanical guardrails
        run: python scripts/guardrails.py

      - name: Type check (strict, clean core subset)
        run: bash scripts/typecheck.sh

      - name: Pytest
        run: python -m pytest tests/ -q
