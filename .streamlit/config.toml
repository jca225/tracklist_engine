# Tracklist Engine — DAW-inspired dark theme
# Palette blends Ableton Live 12 (warm dark gray) with Serato DJ Pro (orange accent)
# and 1001Tracklists (dense, data-first).

[theme]
base             = "dark"
backgroundColor         = "#141414"
secondaryBackgroundColor = "#1e1e1e"
primaryColor            = "#1a8fa0"
textColor               = "#e6e6e6"
font                    = "sans serif"

[server]
runOnSave        = true
headless         = true

[browser]
gatherUsageStats = false

[client]
toolbarMode      = "minimal"
showErrorDetails = true
