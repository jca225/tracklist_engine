<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Browser DAW Prototype</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <header class="app-header">
      <div class="header-title">
        <h1>Browser DAW Prototype</h1>
        <p class="muted">Notion-inspired layout, DJ-oriented workflow</p>
      </div>
      <div class="controls top-controls">
        <label>
          Project
          <select id="projectSelect"></select>
        </label>
        <label>
          Master BPM
          <input id="masterBpmInput" type="number" step="0.1" min="60" max="220" value="128" />
        </label>
        <label>
          Camelot
          <select id="masterCamelotSelect">
            <option value="">None</option>
            <option value="1A">1A</option><option value="2A">2A</option><option value="3A">3A</option>
            <option value="4A">4A</option><option value="5A">5A</option><option value="6A">6A</option>
            <option value="7A">7A</option><option value="8A">8A</option><option value="9A">9A</option>
            <option value="10A">10A</option><option value="11A">11A</option><option value="12A">12A</option>
            <option value="1B">1B</option><option value="2B">2B</option><option value="3B">3B</option>
            <option value="4B">4B</option><option value="5B">5B</option><option value="6B">6B</option>
            <option value="7B">7B</option><option value="8B">8B</option><option value="9B">9B</option>
            <option value="10B">10B</option><option value="11B">11B</option><option value="12B">12B</option>
          </select>
        </label>
        <button id="saveProjectBtn">Save Project</button>
        <label>
          API
          <input id="apiBase" value="http://127.0.0.1:8000" />
        </label>
        <label>
          Theme
          <select id="themeSelect">
            <option value="dark">Dark</option>
            <option value="light">Light</option>
            <option value="blue">Blue</option>
            <option value="sunset">Sunset</option>
          </select>
        </label>
        <button id="loadTracksBtn">Load Tracks</button>
      </div>
    </header>

    <main class="app-main">
      <aside class="left-panel">
        <h2>Track Browser</h2>
        <p class="muted">Click a track to add a clip to lane 1.</p>
        <input id="trackSearchInput" type="text" placeholder="Search song or artist..." />
        <div id="trackBrowserScroll" tabindex="0">
          <ul id="trackList"></ul>
        </div>
      </aside>

      <section class="arrangerWrap right-panel">
        <h2>Arranger</h2>
        <div class="controls arranger-controls">
          <label><input id="autoSyncCheckbox" type="checkbox" checked /> Auto sync on add</label>
          <button id="zoomOutBtn">-</button>
          <label>
            Zoom
            <input id="zoomSlider" type="range" min="0.6" max="4" step="0.1" value="1" />
          </label>
          <button id="zoomInBtn">+</button>
          <span id="zoomValue" class="muted">100%</span>
          <button id="playBtn">Play</button>
          <button id="pauseBtn">Pause</button>
          <button id="stopBtn">Stop</button>
          <label><input id="loopEnabledCheckbox" type="checkbox" /> Loop</label>
          <label>
            Loop Start (s)
            <input id="loopStartInput" type="number" min="0" step="0.1" value="0" />
          </label>
          <label>
            Loop End (s)
            <input id="loopEndInput" type="number" min="0" step="0.1" value="16" />
          </label>
          <button id="setLoopFromPlayheadBtn">Set Loop Start @ Playhead</button>
          <button id="setLoopEndFromPlayheadBtn">Set Loop End @ Playhead</button>
          <label>
            Clip Volume
            <input id="clipVolumeSlider" type="range" min="0" max="1.2" step="0.01" value="0.72" />
          </label>
          <span id="clipVolumeValue" class="muted">72%</span>
          <button id="splitClipBtn">Split Selected</button>
          <button id="trimLeftBtn">Trim Left +1s</button>
          <button id="trimRightBtn">Trim Right -1s</button>
          <button id="moveClipUpBtn">Move Up</button>
          <button id="moveClipDownBtn">Move Down</button>
          <button id="addLaneBtn">Add Lane</button>
          <button id="deleteClipBtn">Delete Selected</button>
        </div>
        <p class="muted">Drag clips horizontally and vertically to move across lanes. Click clip to select.</p>
        <div id="arranger">
          <div id="loopRegion"></div>
          <div id="playhead"></div>
          <canvas id="timeRuler"></canvas>
          <div id="lanesContainer"></div>
        </div>
      </section>
    </main>

    <script src="./app.js"></script>
  </body>
</html>
